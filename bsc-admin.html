<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – BSC Auto</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--white:#f5f2ee;--gold:#c9a84c;--gold-light:#e8c97a;--gray:#1a1a1a;--gray2:#242424;--gray3:#2e2e2e;--gray-light:#888;--red:#e74c3c;--green:#27ae60;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.login-box{background:var(--gray);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:3rem;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:var(--gold);margin-bottom:.3rem;}
.login-logo span{color:var(--white);}
.login-sub{font-size:.78rem;color:var(--gray-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem;}
.login-label{display:block;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray-light);margin-bottom:.4rem;text-align:left;}
.login-input{width:100%;background:var(--gray2);border:1px solid rgba(255,255,255,.08);color:var(--white);padding:.9rem 1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;border-radius:2px;outline:none;transition:border-color .3s;margin-bottom:1.2rem;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:var(--black);padding:1rem;font-weight:700;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:all .3s;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:var(--gold-light);}
.login-err{color:var(--red);font-size:.82rem;margin-top:.8rem;display:none;}
.login-icon{font-size:2.5rem;margin-bottom:1.2rem;}

/* ADMIN LAYOUT */
#admin-screen{display:none;}
.admin-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 5%;background:rgba(10,10,10,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,.15);}
.admin-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;color:var(--gold);}
.admin-logo span{color:var(--white);}
.admin-badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;padding:.25rem .7rem;border-radius:2px;}
.admin-nav-right{display:flex;align-items:center;gap:1rem;}
.nav-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;border-radius:2px;text-decoration:none;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;border:1px solid transparent;}
.nav-btn-outline{background:transparent;border-color:rgba(255,255,255,.12);color:var(--gray-light);}
.nav-btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.nav-btn-danger{background:transparent;border-color:rgba(231,76,60,.3);color:var(--red);}
.nav-btn-danger:hover{background:var(--red);color:var(--white);}

.admin-body{padding:6rem 5% 3rem;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5px;background:rgba(255,255,255,.05);margin-bottom:3rem;}
.stat-card{background:var(--gray);padding:1.5rem;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;height:2px;width:100%;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.stat-card:hover::after{transform:scaleX(1);}
.stat-card-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--gold);letter-spacing:2px;}
.stat-card-lbl{font-size:.7rem;color:var(--gray-light);text-transform:uppercase;letter-spacing:1px;}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.sec-title-admin{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;}
.btn-add{background:var(--gold);color:var(--black);padding:.6rem 1.4rem;font-weight:700;font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:all .3s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:.4rem;}
.btn-add:hover{background:var(--gold-light);transform:translateY(-1px);}

/* TABLE */
.table-wrap{background:var(--gray);border:1px solid rgba(255,255,255,.06);border-radius:2px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead tr{border-bottom:1px solid rgba(201,168,76,.2);}
thead th{padding:1rem 1.2rem;text-align:left;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .2s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
td{padding:.9rem 1.2rem;font-size:.88rem;vertical-align:middle;}
.td-img{width:70px;height:50px;object-fit:cover;border-radius:2px;background:var(--gray3);}
.td-img-placeholder{width:70px;height:50px;background:var(--gray3);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;opacity:.5;}
.td-name{font-weight:600;}
.td-merk{font-size:.72rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.td-price{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:1px;}
.badge-k{padding:.25rem .6rem;border-radius:2px;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;white-space:nowrap;}
.badge-k.bagus{background:rgba(39,174,96,.2);color:#27ae60;border:1px solid rgba(39,174,96,.3);}
.badge-k.bekas{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.badge-k.servis{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3);}
.badge-k.sold{background:rgba(120,120,120,.15);color:#999;border:1px solid rgba(120,120,120,.3);}
.badge-k.unggulan{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4);}
.td-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
.act-btn{padding:.35rem .75rem;font-size:.72rem;letter-spacing:1px;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;border:1px solid;}
.act-edit{background:transparent;border-color:rgba(201,168,76,.3);color:var(--gold);}
.act-edit:hover{background:var(--gold);color:var(--black);}
.act-sold{background:transparent;border-color:rgba(120,120,120,.3);color:#999;}
.act-sold:hover{background:#555;color:#fff;border-color:#555;}
.act-unsold{background:transparent;border-color:rgba(39,174,96,.3);color:var(--green);}
.act-unsold:hover{background:var(--green);color:#fff;}
.act-del{background:transparent;border-color:rgba(231,76,60,.25);color:var(--red);}
.act-del:hover{background:var(--red);color:#fff;}

/* MODAL FORM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-form{background:var(--gray2);border:1px solid rgba(201,168,76,.2);border-radius:4px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-form-head{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2rem;border-bottom:1px solid rgba(255,255,255,.07);}
.modal-form-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;}
.modal-close-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--gray-light);width:2rem;height:2rem;border-radius:2px;cursor:pointer;font-size:1rem;transition:all .3s;}
.modal-close-btn:hover{border-color:var(--red);color:var(--red);}
.modal-form-body{padding:2rem;}
.f-group{margin-bottom:1.1rem;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.f-label{display:block;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray-light);margin-bottom:.4rem;}
.f-input{width:100%;background:var(--gray);border:1px solid rgba(255,255,255,.08);color:var(--white);padding:.8rem .9rem;font-family:'DM Sans',sans-serif;font-size:.88rem;border-radius:2px;outline:none;transition:border-color .3s;}
.f-input:focus{border-color:var(--gold);}
.f-input::placeholder{color:#555;}
textarea.f-input{resize:vertical;min-height:80px;}
select.f-input option{background:var(--gray2);}

/* IMAGE UPLOAD */
.img-upload-area{border:2px dashed rgba(255,255,255,.1);border-radius:2px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.img-upload-area:hover{border-color:var(--gold);background:rgba(201,168,76,.04);}
.img-upload-area.has-img{border-style:solid;border-color:rgba(201,168,76,.3);}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:2px;display:none;}
.img-upload-icon{font-size:2rem;margin-bottom:.5rem;opacity:.5;}
.img-upload-txt{font-size:.82rem;color:var(--gray-light);}
.img-upload-hint{font-size:.72rem;color:#555;margin-top:.3rem;}
#foto-input{position:absolute;inset:0;opacity:0;cursor:pointer;}

.modal-form-footer{display:flex;gap:.8rem;padding:0 2rem 2rem;flex-wrap:wrap;}
.btn-save{background:var(--gold);color:var(--black);padding:.85rem 2rem;font-weight:700;font-size:.88rem;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:all .3s;font-family:'DM Sans',sans-serif;flex:1;}
.btn-save:hover{background:var(--gold-light);}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--gray-light);padding:.85rem 1.5rem;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .3s;font-family:'DM Sans',sans-serif;}
.btn-cancel:hover{border-color:var(--red);color:var(--red);}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray);border:1px solid var(--gold);color:var(--white);padding:.9rem 2rem;border-radius:2px;font-size:.85rem;z-index:9999;opacity:0;transition:all .4s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY */
.empty-row td{text-align:center;padding:3rem;color:var(--gray-light);}

@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .f-row{grid-template-columns:1fr;}
  .admin-badge{display:none;}
}
</style>
</head>

        <div class="f-group">
          <label class="f-label">Bahan Bakar</label>
          <select class="f-input" id="f-bahan">
            <option>Bensin</option><option>Diesel</option><option>Hybrid</option><option>Listrik</option>
          </select>
        </div>
      </div>

      <div class="f-group">
        <label class="f-label">Kondisi *</label>
        <select class="f-input" id="f-kondisi">
          <option>Bagus</option>
          <option>Bekas</option>
          <option>Perlu Servis</option>
        </select>
      </div>

      <div class="f-group">
        <label class="f-label">Deskripsi / Catatan</label>
        <textarea class="f-input" id="f-deskripsi" placeholder="Contoh: Kondisi sangat baik, ban baru, AC dingin, service record lengkap..."></textarea>
      </div>

      <div class="f-group">
        <label class="f-label">Nomor WA Kontak (opsional)</label>
        <input type="text" class="f-input" id="f-wa" placeholder="6285121032383" value="6285121032383">
      </div>
    </div>
    <div class="modal-form-footer">
      <button class="btn-save" onclick="saveUnit()">💾 Simpan Unit</button>
      <button class="btn-cancel" onclick="closeForm()">Batal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PASS = 'BSCAuto';
var fotoBase64 = '';
var editId = null;

// LOGIN
function doLogin() {
  var v = document.getElementById('pw-input').value;
  if (v === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    renderTable();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').focus();

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// STORAGE
function getUnits() { try { return JSON.parse(localStorage.getItem('bsc_units')||'[]'); } catch(e){ return []; } }
function saveUnits(u) { localStorage.setItem('bsc_units', JSON.stringify(u)); }

function formatHarga(h) {
  var n = parseInt(h);
  if (n >= 1000000000) return 'Rp '+(n/1000000000).toFixed(1).replace('.0','')+'M';
  if (n >= 1000000) return 'Rp '+(n/1000000).toFixed(0)+' Jt';
  return 'Rp '+n.toLocaleString('id-ID');
}

// STATS
function updateStats() {
  var u = getUnits();
  var sold = u.filter(function(x){return x.sold;});
  var tersedia = u.filter(function(x){return !x.sold;});
  var totalNilai = tersedia.reduce(function(a,b){return a+parseInt(b.harga||0);},0);
  document.getElementById('s-total').textContent = u.length;
  document.getElementById('s-tersedia').textContent = tersedia.length;
  document.getElementById('s-sold').textContent = sold.length;
  document.getElementById('s-nilai').textContent = formatHarga(totalNilai);
}

// RENDER TABLE
function renderTable() {
  updateStats();
  var units = getUnits();
  var tbody = document.getElementById('unit-tbody');
  if (!units.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Belum ada unit. Klik "+ Tambah Unit Baru" untuk memulai.</td></tr>';
    return;
  }
  tbody.innerHTML = units.map(function(u) {
    var imgHtml = u.foto
      ? '<img class="td-img" src="'+u.foto+'" alt="'+u.nama+'">'
      : '<div class="td-img-placeholder">🚗</div>';
    var kondisiClass = u.kondisi==='Bagus'?'bagus':u.kondisi==='Bekas'?'bekas':'servis';
    var soldBadge = u.sold ? '<span class="badge-k sold" style="margin-left:.4rem;">Terjual</span>' : '';
    var unggulanBadge = u.unggulan ? '<span class="badge-k unggulan" style="margin-left:.4rem;">★ Unggulan</span>' : '';
    var soldBtn = u.sold
      ? '<button class="act-btn act-unsold" onclick="toggleSold('+u.id+')">↩ Tersedia</button>'
      : '<button class="act-btn act-sold" onclick="toggleSold('+u.id+')">✓ Terjual</button>';
    var unggulanBtn = u.unggulan
      ? '<button class="act-btn" style="border-color:rgba(201,168,76,.4);color:var(--gold);" onclick="toggleUnggulan('+u.id+')">★ Unggulan</button>'
      : '<button class="act-btn" style="border-color:rgba(255,255,255,.1);color:#555;" onclick="toggleUnggulan('+u.id+')">☆ Biasa</button>';
    return '<tr>' +
      '<td>'+imgHtml+'</td>' +
      '<td><div class="td-merk">'+u.merk+'</div><div class="td-name">'+u.nama+'</div></td>' +
      '<td>'+u.tahun+' · '+parseInt(u.km||0).toLocaleString('id-ID')+' km</td>' +
      '<td class="td-price">'+formatHarga(u.harga)+'</td>' +
      '<td><span class="badge-k '+kondisiClass+'">'+u.kondisi+'</span>'+soldBadge+unggulanBadge+'</td>' +
      '<td><div class="td-actions">'+
        '<button class="act-btn act-edit" onclick="openForm('+u.id+')">✏️ Edit</button>'+
        soldBtn+unggulanBtn+
        '<button class="act-btn act-del" onclick="deleteUnit('+u.id+')">🗑️</button>'+
      '</div></td>' +
    '</tr>';
  }).join('');
}

// FORM
function openForm(id) {
  editId = id || null;
  fotoBase64 = '';
  document.getElementById('form-title').textContent = id ? 'Edit Unit' : 'Tambah Unit Baru';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-placeholder').style.display = 'block';
  document.getElementById('upload-area').classList.remove('has-img');

  if (id) {
    var u = getUnits().find(function(x){return x.id===id;});
    if (!u) return;
    document.getElementById('f-id').value = u.id;
    document.getElementById('f-merk').value = u.merk;
    document.getElementById('f-nama').value = u.nama;
    document.getElementById('f-tahun').value = u.tahun;
    document.getElementById('f-km').value = u.km||'';
    document.getElementById('f-harga').value = u.harga;
    document.getElementById('f-bahan').value = u.bahan||'Bensin';
    document.getElementById('f-kondisi').value = u.kondisi;
    document.getElementById('f-deskripsi').value = u.deskripsi||'';
    document.getElementById('f-wa').value = u.wa||'6285121032383';
    document.getElementById('f-foto-url').value = u.foto||'';
    if (u.foto) {
      var prev = document.getElementById('img-preview');
      prev.src = u.foto; prev.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('upload-area').classList.add('has-img');
    }
  } else {
    document.getElementById('f-id').value = '';
    document.getElementById('f-merk').value = '';
    document.getElementById('f-nama').value = '';
    document.getElementById('f-tahun').value = '';
    document.getElementById('f-km').value = '';
    document.getElementById('f-harga').value = '';
    document.getElementById('f-bahan').value = 'Bensin';
    document.getElementById('f-kondisi').value = 'Bagus';
    document.getElementById('f-deskripsi').value = '';
    document.getElementById('f-wa').value = '6285121032383';
    document.getElementById('f-foto-url').value = '';
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeForm() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  fotoBase64 = '';
}

// FOTO PREVIEW
function previewFoto(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 5*1024*1024) { showToast('⚠️ Ukuran foto maks 5MB'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    fotoBase64 = e.target.result;
    var prev = document.getElementById('img-preview');
    prev.src = fotoBase64; prev.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
    document.getElementById('upload-area').classList.add('has-img');
    document.getElementById('f-foto-url').value = '';
  };
  reader.readAsDataURL(file);
}

function previewUrl(url) {
  if (!url) return;
  fotoBase64 = '';
  var prev = document.getElementById('img-preview');
  prev.src = url; prev.style.display = 'block';
  document.getElementById('upload-placeholder').style.display = 'none';
  document.getElementById('upload-area').classList.add('has-img');
}

// SAVE
function saveUnit() {
  var merk = document.getElementById('f-merk').value.trim();
  var nama = document.getElementById('f-nama').value.trim();
  var tahun = document.getElementById('f-tahun').value.trim();
  var harga = document.getElementById('f-harga').value.trim();
  if (!merk||!nama||!tahun||!harga) { showToast('⚠️ Merk, Nama, Tahun, Harga wajib diisi!'); return; }

  var foto = fotoBase64 || document.getElementById('f-foto-url').value.trim() || '';
  var units = getUnits();

  if (editId) {
    units = units.map(function(u) {
      if (u.id !== editId) return u;
      return {
        id:u.id, merk:merk, nama:nama, tahun:tahun,
        km:document.getElementById('f-km').value||'0',
        harga:harga, bahan:document.getElementById('f-bahan').value,
        kondisi:document.getElementById('f-kondisi').value,
        deskripsi:document.getElementById('f-deskripsi').value,
        wa:document.getElementById('f-wa').value||'6285121032383',
        foto:foto, sold:u.sold||false
      };
    });
    showToast('✅ Unit berhasil diperbarui!');
  } else {
    var newId = Date.now();
    units.push({
      id:newId, merk:merk, nama:nama, tahun:tahun,
      km:document.getElementById('f-km').value||'0',
      harga:harga, bahan:document.getElementById('f-bahan').value,
      kondisi:document.getElementById('f-kondisi').value,
      deskripsi:document.getElementById('f-deskripsi').value,
      wa:document.getElementById('f-wa').value||'6285121032383',
      foto:foto, sold:false
    });
    showToast('✅ Unit baru berhasil ditambahkan!');
  }
  saveUnits(units);
  closeForm();
  renderTable();
}

function toggleSold(id) {
  var units = getUnits();
  units = units.map(function(u){ return u.id===id ? Object.assign({},u,{sold:!u.sold}) : u; });
  saveUnits(units);
  renderTable();
  showToast('✅ Status unit diperbarui!');
}

function deleteUnit(id) {
  if (!confirm('Yakin ingin menghapus unit ini?')) return;
  var units = getUnits().filter(function(u){ return u.id!==id; });
  saveUnits(units);
  renderTable();
  showToast('🗑️ Unit dihapus.');
}

function toggleUnggulan(id) {
  var units = getUnits();
  units = units.map(function(u){ return u.id===id ? Object.assign({},u,{unggulan:!u.unggulan}) : u; });
  saveUnits(units);
  renderTable();
  showToast('★ Status unggulan diperbarui!');
}

function exportExcel() {
  var units = getUnits();
  if (!units.length) { showToast('⚠️ Belum ada data unit!'); return; }
  var rows = [['No','Merk','Nama','Tahun','KM','Harga','Bahan Bakar','Kondisi','Unggulan','Status','Deskripsi']];
  units.forEach(function(u, i) {
    rows.push([
      i+1, u.merk, u.nama, u.tahun,
      parseInt(u.km||0).toLocaleString('id-ID')+' km',
      'Rp '+parseInt(u.harga).toLocaleString('id-ID'),
      u.bahan||'Bensin', u.kondisi,
      u.unggulan?'Unggulan':'Biasa',
      u.sold?'Terjual':'Tersedia',
      u.deskripsi||'-'
    ]);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'BSC-Auto-Unit-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  showToast('✅ Data berhasil diexport!');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
